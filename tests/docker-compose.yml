services:
  simplex-bot1:
    build: ./simplex
    ports:
      - "5225:5225"
    volumes:
      - bot1-data:/home/simplex/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5225"]
      interval: 2s
      timeout: 5s
      retries: 10

  simplex-bot2:
    build: ./simplex
    ports:
      - "5226:5225"
    volumes:
      - bot2-data:/home/simplex/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5225"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  bot1-data:
  bot2-data:
